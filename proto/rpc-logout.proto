syntax = "proto3";

package trueauth;

option go_package = "github.com/sirjager/trueauth/rpc";

message LogoutRequest {
    // if no session are provided then all session are deleted
    // if specific/multiple sessions sepearted by comma are provided only those sessions will be deleted
    string sessions = 1;
}

message LogoutResponse {
    string message = 1;
}
