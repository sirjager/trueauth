syntax = "proto3";

package trueauth;

option go_package = "github.com/sirjager/trueauth/rpc";

import "metadata.proto";

message RegisterRequest {
    string email     = 1;
    string username  = 2;
    string password  = 3;
    string firstname = 4;
    string lastname  = 5;
}

message RegisterResponse {
    string           message  = 1;
    ResponseMetadata metadata = 100;
}
