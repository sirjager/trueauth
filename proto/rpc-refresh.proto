syntax = "proto3";

package trueauth;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/sirjager/trueauth/rpc";

message RefreshRequest {
    string refresh_token = 1;  // Refresh Token
}

message RefreshResponse {
    string                    session_id              = 1;  // Session ID
    string                    access_token            = 2;  // Access Token
    google.protobuf.Timestamp access_token_expires_at = 3;  // Access Token Expiration
}
